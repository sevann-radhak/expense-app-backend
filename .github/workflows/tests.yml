name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ExpenseTracker.sln

      - name: Prepare coverage output directory
        run: mkdir -p "${{ github.workspace }}/coverage"

      - name: Unit tests (coverage, part 1)
        run: >
          dotnet test tests/ExpenseTracker.UnitTests/ExpenseTracker.UnitTests.csproj -c Release --no-restore
          --filter "Category=Unit"
          /p:CollectCoverage=true
          /p:CoverletOutput=${{ github.workspace }}/coverage/coverage.json
          /p:CoverletOutputFormat=json
          /p:ExcludeByFile="**/Migrations/**,**/Program.cs,**/JwtAuthenticationExtensions.cs"

      - name: Integration tests (coverage merge + line threshold)
        run: >
          dotnet test tests/ExpenseTracker.IntegrationTests/ExpenseTracker.IntegrationTests.csproj -c Release --no-restore
          --filter "Category=Integration"
          /p:CollectCoverage=true
          /p:MergeWith=${{ github.workspace }}/coverage/coverage.json
          /p:CoverletOutput=${{ github.workspace }}/coverage/coverage.json
          /p:CoverletOutputFormat=json
          /p:ThresholdType=line
          /p:Threshold=70
          /p:ExcludeByFile="**/Migrations/**,**/Program.cs,**/JwtAuthenticationExtensions.cs"
