name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ExpenseTracker.sln

      - name: Unit tests
        run: dotnet test tests/ExpenseTracker.UnitTests/ExpenseTracker.UnitTests.csproj -c Release --no-restore --filter "Category=Unit" --verbosity normal

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ExpenseTracker.sln

      - name: Integration tests (Testcontainers)
        run: dotnet test tests/ExpenseTracker.IntegrationTests/ExpenseTracker.IntegrationTests.csproj -c Release --no-restore --filter "Category=Integration" --verbosity normal
